<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lily's World</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
</head>
<body>

  <!-- Always-on particle canvas (background layer) -->
  <canvas id="particle-canvas"></canvas>

  <!-- Camera feed (used by particle system, visually hidden) -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- ── Welcome Screen ─────────────────────────────── -->
  <div id="welcome-screen">
    <div class="welcome-content">
      <h1 class="title">LILY'S<br>WORLD</h1>
      <div class="divider"></div>
      <p class="subtitle">"world" — what is it, really? How do you define it?<br><br>Designer: Carl Liu</p>
      <button id="start-btn">START GAME</button>
      <p id="loading-msg"></p>
    </div>
  </div>

  <!-- ── HUD (shown during game) ────────────────────── -->
  <div id="hud">
    <div id="scan-count">SCANNED: <span id="count">0</span> / 10</div>
    <div id="scan-dots"></div>
  </div>

  <!-- ── Lily Dialog Box ────────────────────────────── -->
  <div id="dialog-box">
    <div class="dialog-name" id="dialog-name">LILY</div>
    <div class="dialog-text" id="dialog-text"></div>
  </div>

  <!-- ── Blackout Overlay (random eye pain events) ───── -->
  <div id="blackout"></div>

  <!-- ── Ending Overlay (flash / black / thank you) ─── -->
  <div id="ending-overlay"></div>

  <script src="js/particles.js"></script>
  <script src="js/detector.js"></script>
  <script src="js/game.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/dialog.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
